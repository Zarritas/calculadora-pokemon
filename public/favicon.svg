<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Calculadora Pokémon Champions">
  <defs>
    <clipPath id="ball">
      <circle cx="32" cy="32" r="29" />
    </clipPath>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5a5a" />
      <stop offset="1" stop-color="#e8253a" />
    </linearGradient>
  </defs>

  <!-- Cuerpo de la Poké Ball -->
  <g clip-path="url(#ball)">
    <rect x="0" y="0" width="64" height="32" fill="url(#top)" />
    <rect x="0" y="32" width="64" height="32" fill="#f4f5f7" />
    <rect x="0" y="28" width="64" height="8" fill="#1b1b1b" />
    <!-- Brillo -->
    <circle cx="21" cy="18" r="7" fill="#ffffff" opacity="0.28" />
  </g>

  <!-- Contorno -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#1b1b1b" stroke-width="3" />

  <!-- Botón central -->
  <circle cx="32" cy="32" r="9.5" fill="#f4f5f7" stroke="#1b1b1b" stroke-width="4" />
  <circle cx="32" cy="32" r="3.6" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.6" />
</svg>
